<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐳 Docker Todo App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <h1>🐳 Docker Todo App</h1>
        <p class="subtitle">Running in a Container!</p>
        
        <!-- Input Section -->
        <div class="input-group">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="What needs to be done?"
                aria-label="New todo item">
            <button onclick="addTodo()" aria-label="Add todo">Add</button>
        </div>
        
        <!-- Todo List -->
        <ul id="todoList" aria-label="Todo list"></ul>
        
        <!-- Statistics -->
        <div class="stats">
            <span id="totalTodos">0 tasks</span>
        </div>
    </div>

    <script>
        // ============================================
        // LOAD TODOS ON PAGE LOAD
        // ============================================
        window.onload = function() {
            loadTodos();
        };

        // ============================================
        // LOAD ALL TODOS FROM API
        // ============================================
        async function loadTodos() {
            try {
                // WHAT: Fetch todos from backend API
                // WHY: Need to display all todos
                // HOW: HTTP GET request to /api/todos
                const response = await fetch('/api/todos');
                const todos = await response.json();
                
                // Clear existing list
                const todoList = document.getElementById('todoList');
                todoList.innerHTML = '';
                
                // Add each todo to DOM
                todos.forEach(todo => {
                    addTodoToDOM(todo);
                });
                
                // Update statistics
                updateStats(todos.length);
            } catch (error) {
                console.error('Error loading todos:', error);
                alert('Failed to load todos. Please refresh the page.');
            }
        }

        // ============================================
        // ADD NEW TODO
        // ============================================
        async function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            
            // Validate input
            if (text === '') {
                alert('Please enter a todo item');
                return;
            }
            
            try {
                // WHAT: Send new todo to backend
                // WHY: Create new todo in database
                // HOW: HTTP POST request with JSON data
                const response = await fetch('/api/todos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to add todo');
                }
                
                const todo = await response.json();
                
                // Add to DOM
                addTodoToDOM(todo);
                
                // Clear input
                input.value = '';
                
                // Refresh to update count
                loadTodos();
            } catch (error) {
                console.error('Error adding todo:', error);
                alert('Failed to add todo. Please try again.');
            }
        }

        // ============================================
        // ADD TODO TO DOM (VISUAL DISPLAY)
        // ============================================
        function addTodoToDOM(todo) {
            const todoList = document.getElementById('todoList');
            const li = document.createElement('li');
            
            // Add completed class if todo is done
            li.className = todo.completed ? 'completed' : '';
            
            // Create HTML structure
            li.innerHTML = `
                <input 
                    type="checkbox" 
                    ${todo.completed ? 'checked' : ''} 
                    onchange="toggleTodo(${todo.id}, this.checked)"
                    aria-label="Mark as ${todo.completed ? 'incomplete' : 'complete'}">
                <span>${escapeHtml(todo.text)}</span>
                <button onclick="deleteTodo(${todo.id})" aria-label="Delete todo">Delete</button>
            `;
            
            todoList.appendChild(li);
        }

        // ============================================
        // TOGGLE TODO COMPLETION
        // ============================================
        async function toggleTodo(id, completed) {
            try {
                // WHAT: Update todo completion status
                // WHY: User marked todo as done/undone
                // HOW: HTTP PUT request with new status
                const response = await fetch(`/api/todos/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ completed: completed })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to update todo');
                }
                
                // Refresh list
                loadTodos();
            } catch (error) {
                console.error('Error updating todo:', error);
                alert('Failed to update todo. Please try again.');
                // Reload to reset checkbox
                loadTodos();
            }
        }

        // ============================================
        // DELETE TODO
        // ============================================
        async function deleteTodo(id) {
            // Confirm deletion
            if (!confirm('Are you sure you want to delete this todo?')) {
                return;
            }
            
            try {
                // WHAT: Delete todo from backend
                // WHY: User wants to remove todo
                // HOW: HTTP DELETE request
                const response = await fetch(`/api/todos/${id}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    throw new Error('Failed to delete todo');
                }
                
                // Refresh list
                loadTodos();
            } catch (error) {
                console.error('Error deleting todo:', error);
                alert('Failed to delete todo. Please try again.');
            }
        }

        // ============================================
        // UPDATE STATISTICS
        // ============================================
        function updateStats(count) {
            const statsElement = document.getElementById('totalTodos');
            statsElement.textContent = `${count} task${count !== 1 ? 's' : ''}`;
        }

        // ============================================
        // ESCAPE HTML (SECURITY)
        // ============================================
        function escapeHtml(text) {
            // WHAT: Escapes HTML special characters
            // WHY: Prevent XSS attacks
            // HOW: Replace special chars with HTML entities
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('todoInput');
            
            // Press Enter to add todo
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addTodo();
                }
            });
            
            // Focus input on page load
            input.focus();
        });
    </script>
</body>
</html>
